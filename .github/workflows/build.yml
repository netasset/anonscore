name: Build anonscore.js

# Recompiles anonscore.jsx -> anonscore.js on feature branches so the committed
# build never goes stale. main is updated only via PRs, which therefore always
# carry a fresh build (avoids pushing to the protected main branch directly).
on:
  push:
    branches-ignore: [main]
    # Any input build.mjs compiles or content-hashes into sw.js's cache key.
    paths: ["anonscore.jsx", "index.html", "manifest.webmanifest", "vendor/**"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - name: Commit rebuilt anonscore.js + sw.js if changed
        run: |
          # build.mjs regenerates anonscore.js AND re-stamps sw.js's cache key.
          # Both must be committed or a stale service-worker cache key ships.
          if git diff --quiet -- anonscore.js sw.js; then
            echo "Build artifacts already up to date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add anonscore.js sw.js
            git commit -m "build: recompile anonscore.js + sw.js [skip ci]"
            git push
          fi
